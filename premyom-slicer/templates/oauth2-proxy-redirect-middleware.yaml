{{- if and (eq (default "forwardAuth" .Values.sso.mode) "embedded") (default true .Values.sso.ingress.enabled) -}}
{{- $scheme := ternary "https" "http" (default false .Values.sso.ingress.tls) -}}
{{- $mode := default "scale" .Values.slicer.web.resizeMode -}}
{{- $defaultPath := printf "/screen.html?scale=%s" (ternary "true" "false" (eq $mode "scale")) -}}
{{- if eq $mode "remote" -}}
{{- $defaultPath = "/vnc.html?resize=remote" -}}
{{- end -}}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "premyom-slicer.fullname" . }}-oauth2-redirect
  labels:
    {{- include "premyom-slicer.labels" . | nindent 4 }}
spec:
  headers:
    customRequestHeaders:
      X-Auth-Request-Redirect: {{ printf "%s://%s%s" $scheme .Values.sso.ingress.hostname $defaultPath | quote }}
{{- end }}
