apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "premyom-rstudio.fullname" . }}
  labels:
    {{- include "premyom-rstudio.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: rstudio
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: rstudio
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: rstudio
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: VAULT_ADDR
              value: {{ .Values.extraVault.addr | default "http://vault.vault.svc.cluster.local:8200" | quote }}
            - name: VAULT_K8S_ROLE
              value: {{ .Values.extraVault.k8sRole | default "premyom-s3-read" | quote }}
            - name: ONYXIA_USER_GROUPS
              value: {{ toJson (.Values.premyom.userGroupsJson | default (list)) | quote }}
            - name: PREMYOM_S3_MOUNT_ENABLED
              value: {{ (.Values.premyom.s3Mount.enabled | default "false") | quote }}
            - name: PREMYOM_S3_NONHDS_ENDPOINT_HOST
              value: {{ (.Values.premyom.s3Mount.nonHdsEndpointHost | default "") | quote }}
            - name: PREMYOM_S3_HDS_ENDPOINT_HOST
              value: {{ (.Values.premyom.s3Mount.hdsEndpointHost | default "") | quote }}
            - name: PREMYOM_S3_VAULT_NONHDS_PATH
              value: {{ (.Values.premyom.s3Mount.vaultNonHdsPath | default "") | quote }}
            - name: PREMYOM_S3_VAULT_HDS_PATH
              value: {{ (.Values.premyom.s3Mount.vaultHdsPath | default "") | quote }}
            - name: PREMYOM_S3_MOUNT_ROOT
              value: {{ (.Values.premyom.s3Mount.mountRoot | default "/mnt/s3") | quote }}
            - name: RSTUDIO_THEME
              value: {{ (.Values.rstudio.darkTheme | default "RStudio Dark") | quote }}
            {{- with .Values.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
          args:
            - /usr/lib/rstudio-server/bin/rserver
            - --server-daemonize=0
            - --www-address=0.0.0.0
            - --www-port=8080
            - --auth-none=1
            - --server-user={{ .Values.rstudio.server.user | default "onyxia" }}
            - --server-working-dir={{ .Values.rstudio.server.workingDir | default "/home/onyxia/work" }}
            - --www-same-site={{ .Values.rstudio.server.sameSite | default "none" }}
            - --auth-cookies-force-secure={{ ternary 1 0 (.Values.rstudio.server.forceSecureCookies | default true) }}
            - --www-verify-user-agent={{ ternary 1 0 (.Values.rstudio.server.verifyUserAgent | default false) }}
          readinessProbe:
            httpGet:
              path: /unsupported_browser.htm
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /unsupported_browser.htm
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
